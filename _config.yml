# GitHub Pages 블로그 설정 (just-the-docs 테마)

title: Evan의 기억공간
description: 자동매매 시스템과 엔지니어링에 대해 배운 것들을 기록합니다.
url: https://Evan-ai-pro.github.io
baseurl: ""
author: Evan

# 테마
theme: just-the-docs

# 플러그인 (GitHub Pages 지원만)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 마크다운
markdown: kramdown
highlighter: rouge

# 포스트 설정
show_excerpts: false

# 사이트 설정
github_username: Evan-ai-pro

# 시간대
timezone: Asia/Seoul

# just-the-docs 설정
color_scheme: dark
search_enabled: true
footer_content: "Copyright &copy; 2026 Evan. All rights reserved."
back_to_top: true

# 기본값
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Evan"

# 빌드 설정
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
