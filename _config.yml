# GitHub Pages 블로그 설정

title: Evan의 기억공간
description: 자동매매 시스템과 엔지니어링에 대해 배운 것들을 기록합니다.
url: https://Evan-ai-pro.github.io
baseurl: ""
author: Evan

# 테마 (GitHub Pages 기본 지원)
theme: minima

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 마크다운
markdown: kramdown
highlighter: rouge

# 포스트 설정 (중요!)
show_excerpts: false

# 사이트 설정
github_username: Evan-ai-pro

# 시간대
timezone: Asia/Seoul

# 다크 모드 설정
# color_scheme 사용 (더 최신 버전)
color_scheme: dark

# 헤더 메뉴 설정 (우측 상단 메뉴 버튼)
header_pages:
  - about.md
  - contact.md

# 기본값
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Evan"

# 빌드 설정
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
