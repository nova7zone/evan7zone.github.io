# GitHub Pages 블로그 설정

# 기본 설정
title: Evan의 기술 블로그
description: 자동매매 시스템과 엔지니어링에 대해 배운 것들을 기록합니다.
url: https://Evan-ai-pro.github.io
baseurl: ""

# 저자 정보
author: Evan

# 테마 (GitHub Pages 지원)
theme: minima

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 블로그 설정
markdown: kramdown
highlighter: rouge

# 포스트 설정
show_excerpts: true  # 목록에서 글 미리보기 표시

# 사이트 설정
twitter_username: ""  # 있으면 추가
github_username: Evan-ai-pro
linkedin_username: ""  # 있으면 추가

# 빌드 설정
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
